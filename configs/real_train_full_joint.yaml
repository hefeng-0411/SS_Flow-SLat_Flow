use_real_vggt: true
use_real_trellis: true
use_decoder: true
use_render_loss: true
allow_mock: false
allow_synthetic: false
alignment_enabled: true
dynamic_anchor_enabled: true
local_attention_enabled: true
confidence_calibration: true
trust_region: true
render_eval: true
real_train: true
ablation_mode: full_joint_with_render_loss
device: cuda
adaptive_batch:
  enabled: true
  min_batch_size: 1
  max_batch_size: 16
  target_utilization: 0.92
  low_utilization: 0.82
  hard_utilization: 0.97
  grow_patience_steps: 8
  cooldown_steps: 3
  grow_factor: 1.25
  reduce_factor: 0.5
early_stop: true
early_stop_metric: loss
early_stop_mode: min
early_stop_patience: 50
early_stop_min_delta: 0.0005
early_stop_relative_delta: true
early_stop_warmup_steps: 20
early_stop_min_steps: 50
dependencies:
  require_gsplat_for_real_eval: true
  require_pycolmap_for_pose_check: false
  require_kornia_for_projection: true
  require_pytorch3d_for_mesh_render: false
  require_nvdiffrast_for_advanced_render: false
  require_kaolin_for_voxel_ops: false
rendering:
  renderer: gsplat
  enable_render_loss: true
  enable_mask_loss: true
  enable_depth_loss: true
  enable_lpips_loss: true
  enable_dino_loss: true
geometry:
  use_pycolmap_pose_check: true
  use_kornia_projection: true
  use_open3d_icp_refine: true
  use_point_cloud_utils_metrics: true
anchors:
  dynamic_anchor_backend: open3d
  use_vggt_pointmap_anchors: true
  use_fps_sampling: true
  use_boundary_sampling: true
  use_uncertainty_sampling: true
evaluation:
  use_gsplat_render_metrics: true
  use_geometry_metrics: true
  use_gaussian_statistics: true
  export_debug_assets: true
model:
  alignment_enabled: true
  dynamic_anchor_enabled: true
  local_attention_enabled: true
  num_anchors: 4096
  geo_dim: 256
  latent_dim: 8
