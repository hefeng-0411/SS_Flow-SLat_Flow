use_real_vggt: true
use_real_trellis: true
use_decoder: true
use_render_loss: true
allow_mock: false
allow_synthetic: false
alignment_enabled: true
dynamic_anchor_enabled: false
local_attention_enabled: true
confidence_calibration: true
trust_region: true
render_eval: true
ablation_mode: static_anchors_only
dependencies:
  require_gsplat_for_real_eval: true
  require_pycolmap_for_pose_check: false
  require_kornia_for_projection: true
  require_pytorch3d_for_mesh_render: false
  require_nvdiffrast_for_advanced_render: false
  require_kaolin_for_voxel_ops: false
rendering: {renderer: gsplat, enable_render_loss: true, enable_mask_loss: true, enable_depth_loss: true, enable_lpips_loss: true, enable_dino_loss: true}
geometry: {use_pycolmap_pose_check: true, use_kornia_projection: true, use_open3d_icp_refine: false, use_point_cloud_utils_metrics: true}
anchors: {dynamic_anchor_backend: torch, use_vggt_pointmap_anchors: false, use_fps_sampling: false, use_boundary_sampling: false, use_uncertainty_sampling: false}
evaluation: {use_gsplat_render_metrics: true, use_geometry_metrics: true, use_gaussian_statistics: true, export_debug_assets: true}
model:
  dynamic_anchor_enabled: false
