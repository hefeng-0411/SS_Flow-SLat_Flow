real_train: true
device: cuda
use_real_vggt: true
use_real_trellis: true
use_decoder: false
use_render_loss: false
allow_mock: false
allow_synthetic: false

vggt:
  root: /mnt/sda2/hef/Base/vggt
  pretrained: facebook/VGGT-1B

trellis:
  root: /mnt/sda2/hef/Base/TRELLIS
  pipeline: microsoft/TRELLIS-image-large

dataset:
  name: meshfleet_trellis
  root: /mnt/sda2/hef/Base/dataset/c9028d206944a33af776f1b6967a6d82af385e97
  train_split: train
  category: null
  num_views: 8
  image_size: 128
  occ_resolution: 64

steps: 1000
batch_size: 1
adaptive_batch:
  enabled: true
  min_batch_size: 1
  max_batch_size: 16
  target_utilization: 0.92
  low_utilization: 0.82
  hard_utilization: 0.97
  grow_patience_steps: 8
  cooldown_steps: 3
  grow_factor: 1.25
  reduce_factor: 0.5
early_stop: true
early_stop_metric: loss
early_stop_mode: min
early_stop_patience: 50
early_stop_min_delta: 0.0005
early_stop_relative_delta: true
early_stop_warmup_steps: 20
early_stop_min_steps: 50
workflow:
  auto_stage2_on_convergence: true
  stage2_command: CUDA_VISIBLE_DEVICES=4,5,6,7 torchrun --nproc_per_node=4 scripts/train_geovis_slat.py --config configs/real_train_slat_only.yaml
lr: 0.0001
weight_decay: 0.0
sigma_min: 0.00001
velocity_reg_weight: 0.001
prior_weight: 0.01
save_every: 100
output_dir: outputs/real_train_ss

dependencies:
  require_gsplat_for_real_eval: false
  require_pycolmap_for_pose_check: false
  require_kornia_for_projection: true
  require_pytorch3d_for_mesh_render: false
  require_nvdiffrast_for_advanced_render: false
  require_kaolin_for_voxel_ops: false

rendering:
  renderer: none
  enable_render_loss: false
  enable_mask_loss: false
  enable_depth_loss: true
  enable_lpips_loss: false
  enable_dino_loss: false

geometry:
  use_pycolmap_pose_check: false
  use_kornia_projection: true
  use_open3d_icp_refine: false
  use_point_cloud_utils_metrics: false

anchors:
  dynamic_anchor_backend: torch
  use_vggt_pointmap_anchors: true
  use_fps_sampling: true
  use_boundary_sampling: true
  use_uncertainty_sampling: true

evaluation:
  use_gsplat_render_metrics: false
  use_geometry_metrics: false
  use_gaussian_statistics: false
  export_debug_assets: true

model:
  alignment_enabled: true
  dynamic_anchor_enabled: true
  local_attention_enabled: true
  num_anchors: 4096
  geo_dim: 256
  latent_dim: 8
